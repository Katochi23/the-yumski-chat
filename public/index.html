<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>quickChat</title>
  <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"
    integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
    crossorigin="anonymous"></script>
  <link href="style.css" rel="stylesheet">
</head>

<body>
  <div class="yum" style="text-align: center;margin-bottom: 10px;">
    <h3>Yumski Chat...</h3>
  </div>
  <div id="chat-container">
    <div id="screen">
      <div id="feedback"></div>
    </div>
    <form id="msg">
      <input type="text" id="handle" name="" value="" placeholder="Handle">
      <input type="text" id="message" name="" value="" placeholder="Message">
      <button type="submit">
        send
      </button>
    </form>
  </div>
  <script src="chat.js">
  </script>
</body>

</html>
